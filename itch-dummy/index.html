<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Merge Master 2048 Challenge</title>
<meta name="description" content="Merge tiles, reach 2048! The ultimate puzzle challenge. Play now for free!">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#1a0533 0%,#0d1b3e 50%,#1a0533 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;color:#fff;position:relative;
}
.glow1{position:absolute;top:25%;left:30%;width:192px;height:192px;border-radius:50%;background:radial-gradient(circle,#EDC22E,transparent);opacity:0.2;filter:blur(60px);pointer-events:none;}
.glow2{position:absolute;bottom:25%;right:30%;width:224px;height:224px;border-radius:50%;background:radial-gradient(circle,#FF7A00,transparent);opacity:0.15;filter:blur(70px);pointer-events:none;}

.container{position:relative;z-index:2;width:100%;max-width:384px;padding:12px;display:flex;flex-direction:column;gap:8px;}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;}
.profile-btn{
  display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:8px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  text-decoration:none;color:#fff;
}
.profile-avatar{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);font-size:14px;
}
.profile-name{font-size:8px;font-weight:700;line-height:1.2;}
.profile-level{font-size:6px;color:#00E676;line-height:1;}

.title-area{text-align:center;}
.title{font-size:16px;font-weight:800;letter-spacing:-0.5px;line-height:1;}
.title .merge{color:#FFD700;text-shadow:0 0 15px rgba(255,215,0,0.4);}
.title .master{color:#FFFFFF;}
.title-sub{font-size:6px;font-weight:700;letter-spacing:3px;color:#EDC22E;}

.top-right{display:flex;align-items:center;gap:4px;}
.bell-btn{
  position:relative;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);cursor:pointer;
}
.bell-icon{font-size:12px;}
.notif-badge{
  position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;
  background:#F65E3B;color:#FFF;font-size:6px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.coins-display{
  display:flex;align-items:center;gap:2px;padding:4px 6px;border-radius:8px;
  background:rgba(237,194,46,0.12);border:1px solid rgba(237,194,46,0.25);
}
.coins-icon{font-size:10px;}
.coins-value{font-size:10px;font-weight:800;color:#EDC22E;}

/* Inventory bar */
.inventory-bar{
  display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:8px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
}
.inv-item{display:flex;align-items:center;gap:2px;}
.inv-emoji{font-size:12px;}
.inv-count{font-size:10px;font-weight:700;}
.inv-right{display:flex;align-items:center;gap:6px;}
.inv-badge{display:flex;align-items:center;gap:2px;padding:2px 4px;border-radius:4px;background:rgba(0,230,118,0.08);}
.inv-badge-icon{font-size:10px;}
.inv-badge-val{font-size:8px;font-weight:700;color:#00E676;}
.inv-badge2{display:flex;align-items:center;gap:2px;padding:2px 4px;border-radius:4px;background:rgba(255,255,255,0.06);}
.inv-badge2-icon{font-size:10px;}
.inv-badge2-val{font-size:8px;font-weight:700;color:rgba(255,255,255,0.5);}

/* PLAY area */
.play-area{display:flex;align-items:center;gap:12px;justify-content:center;width:100%;padding:8px 0;}
.play-btn{
  width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#EDC22E 0%,#FF7A00 100%);
  box-shadow:0 4px 20px rgba(237,194,46,0.5),0 0 40px rgba(237,194,46,0.15),inset 0 -3px 8px rgba(0,0,0,0.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform 0.15s ease;animation:pulse 2s ease-in-out infinite;
  text-decoration:none;color:#FFF;
}
.play-btn:hover{transform:scale(1.08);}
.play-btn:active{transform:scale(0.95);}
.play-btn .play-icon{font-size:28px;margin-left:2px;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.3));}
.play-btn .play-text{font-size:12px;font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,0.3);}
.play-btn .play-sub{font-size:6px;font-weight:600;letter-spacing:2px;opacity:0.7;}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(237,194,46,0.5),0 0 40px rgba(237,194,46,0.15);}50%{box-shadow:0 4px 30px rgba(237,194,46,0.7),0 0 60px rgba(237,194,46,0.25);}}

.mode-btns{display:flex;flex-direction:column;gap:6px;}
.mode-btn{
  display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;
  border:1px solid transparent;cursor:pointer;transition:transform 0.15s ease;text-decoration:none;
}
.mode-btn:active{transform:scale(0.95);}
.mode-btn.battle{background:rgba(246,94,59,0.12);border-color:rgba(246,94,59,0.25);}
.mode-btn.coins-mode{background:rgba(237,194,46,0.12);border-color:rgba(237,194,46,0.25);}
.mode-btn.tour{background:rgba(0,230,118,0.1);border-color:rgba(0,230,118,0.2);}
.mode-icon{font-size:10px;}
.mode-label{font-size:9px;font-weight:700;}
.mode-label.battle-l{color:#F65E3B;}
.mode-label.coins-l{color:#EDC22E;}
.mode-label.tour-l{color:#00E676;}

/* Quick actions grid */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:100%;}
.quick-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:8px;
  cursor:pointer;transition:transform 0.15s ease;text-decoration:none;
}
.quick-btn:active{transform:scale(0.95);}
.quick-btn.daily{background:rgba(237,194,46,0.08);border:1px solid rgba(237,194,46,0.15);}
.quick-btn.spin{background:rgba(0,230,118,0.06);border:1px solid rgba(0,230,118,0.12);}
.quick-btn.weekly{background:rgba(237,194,46,0.1);border:1px solid rgba(237,194,46,0.2);}
.quick-btn.rank{background:rgba(246,94,59,0.06);border:1px solid rgba(246,94,59,0.12);}
.quick-emoji{font-size:16px;}
.quick-name{font-size:7px;font-weight:700;}
.quick-name.daily-n{color:#EDC22E;}
.quick-name.spin-n{color:#00E676;}
.quick-name.weekly-n{color:#EDC22E;}
.quick-name.rank-n{color:#F65E3B;}
.quick-sub{font-size:6px;color:rgba(255,255,255,0.4);}

/* Invite row */
.invite-row{display:flex;gap:6px;width:100%;}
.invite-btn{
  flex:1;display:flex;align-items:center;gap:4px;padding:6px 8px;border-radius:8px;
  background:rgba(0,230,118,0.05);border:1px solid rgba(0,230,118,0.1);
  text-decoration:none;cursor:pointer;
}
.invite-emoji{font-size:14px;}
.invite-label{font-size:8px;font-weight:700;color:#00E676;}
.invite-pct{font-size:6px;color:rgba(255,255,255,0.3);}
.best-score{
  display:flex;align-items:center;gap:4px;padding:6px 8px;border-radius:8px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
}
.best-icon{font-size:12px;color:#EDC22E;}
.best-val{font-size:8px;font-weight:700;color:#EDC22E;}

/* Footer */
.footer-links{
  display:flex;align-items:center;justify-content:center;gap:8px;padding-top:4px;padding-bottom:8px;
  border-top:1px solid rgba(255,255,255,0.04);width:100%;
}
.footer-link{font-size:7px;font-weight:500;color:rgba(255,255,255,0.35);cursor:pointer;text-decoration:none;}
.footer-dot{font-size:7px;color:rgba(255,255,255,0.1);}

@media(max-width:360px){
  .play-btn{width:70px;height:70px;}
  .play-btn .play-icon{font-size:22px;}
  .play-btn .play-text{font-size:10px;}
}
</style>
</head>
