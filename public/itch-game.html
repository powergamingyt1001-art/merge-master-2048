<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Merge Master 2048 Challenge</title>
<meta name="description" content="Merge tiles, reach 2048! The ultimate puzzle challenge. Play now for free!">
<meta name="keywords" content="2048, puzzle, merge, brain game, tile game, challenge">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#1a0533 0%,#0d1b3e 50%,#1a0533 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;overflow:hidden;color:#fff;position:relative;
}
.glow1{position:absolute;top:15%;left:20%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#EDC22E,transparent);opacity:0.2;filter:blur(60px);pointer-events:none;}
.glow2{position:absolute;bottom:20%;right:15%;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,#FF7A00,transparent);opacity:0.15;filter:blur(70px);pointer-events:none;}
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:#EDC22E;opacity:0.3;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:0.3;}90%{opacity:0.3;}100%{transform:translateY(-10vh) scale(1);opacity:0;}}
.title-container{text-align:center;margin-bottom:20px;position:relative;z-index:2;}
.title{font-size:36px;font-weight:900;letter-spacing:-1px;line-height:1.1;}
.title .merge{color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,0.4);}
.title .master{color:#FFFFFF;}
.subtitle{font-size:11px;font-weight:700;letter-spacing:4px;color:#EDC22E;margin-top:4px;}
.tiles-preview{display:flex;gap:8px;margin-bottom:30px;position:relative;z-index:2;}
.tile{
  width:60px;height:60px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;animation:tilePop 0.5s ease-out forwards;opacity:0;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
.tile:nth-child(1){background:#776E65;color:#FFF;animation-delay:0.1s;}
.tile:nth-child(2){background:#EDC22E;color:#FFF;animation-delay:0.2s;}
.tile:nth-child(3){background:#F59563;color:#FFF;animation-delay:0.3s;}
.tile:nth-child(4){background:#F65E3B;color:#FFF;animation-delay:0.4s;font-size:14px;}
@keyframes tilePop{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
.stats{display:flex;gap:12px;margin-bottom:25px;position:relative;z-index:2;}
.stat{
  padding:8px 16px;border-radius:12px;text-align:center;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
}
.stat-value{font-size:16px;font-weight:900;color:#EDC22E;}
.stat-label{font-size:8px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;}
.play-btn{
  position:relative;z-index:2;width:120px;height:120px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#EDC22E 0%,#FF7A00 100%);
  box-shadow:0 6px 30px rgba(237,194,46,0.5),0 0 50px rgba(237,194,46,0.15),inset 0 -4px 10px rgba(0,0,0,0.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform 0.15s ease,box-shadow 0.15s ease;
  animation:pulse 2s ease-in-out infinite;
  text-decoration:none;color:#FFF;
}
.play-btn:hover{transform:scale(1.05);box-shadow:0 8px 40px rgba(237,194,46,0.6),0 0 60px rgba(237,194,46,0.2);}
.play-btn:active{transform:scale(0.95);}
.play-btn .play-icon{font-size:36px;margin-bottom:2px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));}
.play-btn .play-text{font-size:16px;font-weight:900;text-shadow:0 2px 4px rgba(0,0,0,0.3);}
.play-btn .play-sub{font-size:7px;font-weight:600;letter-spacing:2px;opacity:0.7;}
@keyframes pulse{0%,100%{box-shadow:0 6px 30px rgba(237,194,46,0.5),0 0 50px rgba(237,194,46,0.15);}50%{box-shadow:0 6px 40px rgba(237,194,46,0.7),0 0 70px rgba(237,194,46,0.25);}}
.features{display:flex;gap:8px;margin-top:25px;position:relative;z-index:2;flex-wrap:wrap;justify-content:center;max-width:350px;}
.feature{
  padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;gap:4px;
}
.feature .emoji{font-size:12px;}
.bottom-text{margin-top:20px;font-size:9px;color:rgba(255,255,255,0.25);text-align:center;position:relative;z-index:2;}
@media(max-width:400px){
  .title{font-size:28px;}
  .tile{width:50px;height:50px;font-size:15px;}
  .play-btn{width:100px;height:100px;}
  .play-btn .play-icon{font-size:28px;}
  .play-btn .play-text{font-size:14px;}
  .stats{gap:8px;}
  .stat{padding:6px 12px;}
}
</style>
</head>
<body>
<div class="glow1"></div>
<div class="glow2"></div>
<div class="particles" id="particles"></div>
<div class="title-container">
  <div class="title"><span class="merge">MERGE</span> <span class="master">MASTER</span></div>
  <div class="subtitle">2048 CHALLENGE</div>
</div>
<div class="tiles-preview">
  <div class="tile">2</div>
  <div class="tile">8</div>
  <div class="tile">64</div>
  <div class="tile">2048</div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-value">10M+</div><div class="stat-label">Players</div></div>
  <div class="stat"><div class="stat-value">4.8★</div><div class="stat-label">Rating</div></div>
  <div class="stat"><div class="stat-value">#1</div><div class="stat-label">Puzzle</div></div>
</div>
<a href="https://merge-master-2048.vercel.app" target="_blank" rel="noopener noreferrer" class="play-btn">
  <div class="play-icon">▶</div>
  <div class="play-text">PLAY</div>
  <div class="play-sub">FREE NOW</div>
</a>
<div class="features">
  <div class="feature"><span class="emoji">🎮</span> Classic Mode</div>
  <div class="feature"><span class="emoji">⚔️</span> 1v1 Battles</div>
  <div class="feature"><span class="emoji">🏆</span> Tournaments</div>
  <div class="feature"><span class="emoji">🎰</span> Spin Wheel</div>
  <div class="feature"><span class="emoji">📅</span> Daily Rewards</div>
  <div class="feature"><span class="emoji">🌍</span> Global Rank</div>
</div>
<div class="bottom-text">Play in browser • No download required • Free forever</div>
<script>
const p=document.getElementById('particles');
for(let i=0;i<20;i++){const d=document.createElement('div');d.className='particle';d.style.left=Math.random()*100+'%';d.style.animationDuration=(4+Math.random()*6)+'s';d.style.animationDelay=Math.random()*5+'s';d.style.width=(2+Math.random()*4)+'px';d.style.height=d.style.width;if(Math.random()>0.5)d.style.background='#FF7A00';p.appendChild(d);}
</script>
</body>
</html>
